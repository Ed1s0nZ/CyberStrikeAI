# ============================================
# CyberStrikeAI Configuration File
# ============================================
# This config file supports visual configuration via the Web UI
# Click the "Settings" button in the top-right corner to modify settings
# ============================================

# ============================================
# System Settings
# ============================================

# Version number displayed in the frontend (optional; defaults to built-in version if empty)
version: "v1.5.1"
# Server configuration
server:
  host: 0.0.0.0 # Listen address; 0.0.0.0 means listen on all network interfaces
  port: 8080 # HTTP service port; access via browser at http://localhost:8080
# Authentication configuration
auth:
  password: LpcoZSWGcgoc3oB3RlszUize # Auto-generated on first run if empty
  session_duration_hours: 12 # Login session duration (hours); re-login required after expiry
# Logging configuration
log:
  level: info # Log level: debug, info, warn, error
  output: stdout # Log output destination: stdout, stderr, or a file path
# ============================================
# Conversation Configuration
# ============================================

# AI model configuration (supports OpenAI-compatible APIs)
# Required fields: api_key, base_url, model must be set for the system to work
# Supported API providers:
#   - OpenAI: https://api.openai.com/v1
#   - DeepSeek: https://api.deepseek.com/v1
#   - Other OpenAI-protocol-compatible APIs
# Common models: gpt-4, gpt-3.5-turbo, deepseek-chat, claude-3-opus, etc.
openai:
  provider: anthropic # "openai" or "anthropic" — native Anthropic Messages API, no proxy needed
  base_url: https://api.anthropic.com/v1 # Anthropic API endpoint
  api_key: YOUR_API_KEY_HERE # Set your Anthropic or OpenAI API key
  model: claude-haiku-4-5-20251001 # Haiku: higher rate limits, lower cost, faster. Switch to claude-sonnet-4-20250514 when rate limit is increased
  max_total_tokens: 200000 # Claude supports up to 200k context
  rate_limit_delay_ms: 0 # Min ms between API calls (0=no limit, 2000 for free tier)
# ============================================
# Reconnaissance (FOFA) Configuration (optional)
# ============================================
# Used by the "Reconnaissance" page to call the FOFA API (backend proxy to avoid exposing the key in the frontend)
# Can also be configured via environment variables: FOFA_EMAIL / FOFA_API_KEY (higher priority)
fofa:
  base_url: https://fofa.info/api/v1/search/all # Optional; leave empty to use default
  email: "" # FOFA account email (optional; recommended to set in System Settings)
  api_key: "" # FOFA API Key (optional; recommended to set in System Settings)
# Agent configuration
# When the maximum iteration count is reached, the AI will automatically summarize test results
agent:
  max_iterations: 120 # Maximum iterations; max number of tool-call rounds the AI agent will execute
  large_result_threshold: 102400 # Large result threshold (bytes); default 50KB; results exceeding this size are auto-saved to storage
  result_storage_dir: tmp # Result storage directory; large results are saved here
  tool_timeout_minutes: 30 # Max duration for a single tool execution (minutes); auto-terminates on timeout; 0 = no limit (not recommended, may hang)
  time_awareness:
    enabled: true # Inject current timestamp into every system prompt (scheduling, task estimation)
    timezone: "UTC" # IANA timezone, e.g. "Europe/Kyiv", "America/New_York"
# Multi-agent orchestrator (native Go; coexists with single-agent /api/agent-loop)
# Dependencies pulled via go.mod; if download fails, set: go env -w GOPROXY=https://goproxy.cn,direct
# After enabling, restart the service to register /api/multi-agent and /api/multi-agent/stream; frontend can select "multi-agent" mode to use the stream endpoint
multi_agent:
  enabled: true
  default_mode: multi
  robot_use_multi_agent: true
  batch_use_multi_agent: true
  max_iteration: 0 # Max rounds for the Deep orchestrator agent; 0 = inherit agent.max_iterations
  sub_agent_max_iterations: 120
  without_general_sub_agent: false # When false, keep the Deep built-in general-purpose sub-agent
  without_write_todos: false
  orchestrator_instruction: "You are CyberStrikeAI orchestrator, coordinating specialist security agents for authorized penetration testing. Decompose tasks into actionable subtasks, delegate to sub-agents, and synthesize results. Always respond in English. Create todo lists and status updates in English only. Never use Chinese or any non-English language in your output."
# Database configuration
database:
  path: data/conversations.db # SQLite database file path; stores conversation history and messages
  knowledge_db_path: data/knowledge.db # Knowledge base database file path (optional; if empty, uses the conversation database); stores knowledge items and vector embeddings; can be independently copied and reused
# ============================================
# Task Management Configuration
# ============================================
# (Settings are included in the Conversation Configuration above)

# ============================================
# Vulnerability Management Configuration
# ============================================

# Security tools configuration
# The system loads all .yaml tool configuration files from this directory
# Recommended: create a separate config file for each tool in the tools/ directory
security:
  tools_dir: tools # Tool configuration file directory (relative to the config file location)
  # Tool description mode: when loading tools from tools/, which description source is exposed to AI/API
  #   short - prefer short_description (concise, saves tokens); falls back to description if empty
  #   full  - use description (detailed)
  tool_description_mode: full
# ============================================
# MCP Configuration
# ============================================

# MCP protocol configuration
# MCP (Model Context Protocol) is used for tool registration and invocation
mcp:
  enabled: true # Enable MCP server (HTTP mode)
  host: 0.0.0.0 # MCP server listen address
  port: 8081 # MCP server port
  auth_header: "X-MCP-Token" # Authentication: requests must include this header with a value matching auth_header_value to be authorized. Leave empty to disable auth
  auth_header_value: "39d3931b43394491ea4a809ecda00e8b287fec7e4817e35860ef156500a3edb3" # Authentication secret value (used with auth_header; recommend a random string)
# External MCP configuration
external_mcp:
  servers: {}
# ============================================
# Knowledge Base Configuration
# ============================================
knowledge:
  enabled: true # Enable knowledge retrieval feature
  base_path: knowledge_base # Knowledge base directory path (relative to the config file location)
  embedding:
    provider: openai # OpenAI-compatible embedding API (vLLM local)
    model: multilingual-e5-small # Local vLLM embedding model on port 8102
    base_url: http://127.0.0.1:8102/v1 # Local vLLM embedding server
    api_key: none # Not needed for local vLLM
  retrieval:
    top_k: 5 # Number of Top-K results returned by retrieval
    similarity_threshold: 0.7 # Similarity threshold (0-1); results below this value are filtered out
    hybrid_weight: 0.7 # Hybrid retrieval weight (0-1); weight for vector search; 1.0 = pure vector search, 0.0 = pure keyword search
  # ============================================
  # Indexing Configuration (for handling API rate limits)
  # ============================================
  indexing:
    # Chunking configuration
    chunk_size: 512 # Max tokens per chunk (default 512); long texts are split into multiple chunks
    chunk_overlap: 50 # Overlap tokens between chunks (default 50); maintains context continuity
    max_chunks_per_item: 0 # Max chunks per knowledge item (0 = no limit); prevents a single file from consuming too much API quota
    # Rate limit configuration (to avoid 429 errors)
    max_rpm: 0 # Max requests per minute (default 0 = no limit); e.g., OpenAI default is 200 RPM
    rate_limit_delay_ms: 300 # Delay between requests in ms (default 300); used to avoid API rate limits; set to 0 to disable
    # Recommended values: 200 req/min ~ 300ms, 100 req/min ~ 600ms

    # Retry configuration
    max_retries: 3 # Max retry attempts (default 3); auto-retries on rate limit or server errors
    retry_delay_ms: 1000 # Retry delay in ms (default 1000); delay increases with each retry
# ============================================
# Robot Configuration (Telegram)
# ============================================
# Chat with CyberStrikeAI via Telegram bot; uses long-polling, no public IP required
# Configurable in System Settings -> Robot Settings
robots:
  telegram:
    enabled: false
    bot_token: ""
    allowed_user_ids: []
# ============================================
# Skills Configuration
# ============================================

# The system loads all skills from this directory; each skill should be a directory containing a SKILL.md file
# Example: skills/sql-injection-testing/SKILL.md
skills_dir: skills # Skills configuration directory (relative to the config file location)
# ============================================
# Multi-Agent Sub-Agents (Markdown, single source of truth)
# ============================================
# Each .md: YAML front matter (name / id / description / tools / bind_role / max_iterations / optional kind: orchestrator) + body as system prompt
# Orchestrator: fixed filename orchestrator.md, or any filename + front matter kind: orchestrator (only one allowed per directory); the orchestrator is not included in the task sub-agent list
# Advanced: you can still define sub_agents in the multi_agent block; they will be merged with this directory; same id in .md overrides the YAML definition
agents_dir: agents
# ============================================
# Roles Configuration
# ============================================

# The system loads all .yaml role configuration files from this directory
# Each role should have its own config file, e.g.: roles/CTF.yaml, roles/default.yaml, etc.
roles_dir: roles # Role configuration file directory (relative to the config file location)
