# pent_claude_agent configuration file
# Standalone configuration for the penetration testing engineer Agent; customizable MCP, tools, environment, etc.
# Path placeholders: ${PROJECT_ROOT} = CyberStrikeAI project root, ${SCRIPT_DIR} = directory of this script

# Working directory (cwd when the Agent executes tasks)
cwd: "${PROJECT_ROOT}/mcp-servers/pent_claude_agent"

# Tools the Agent is allowed to use
allowed_tools:
  - Read
  - Write
  - Bash
  - Grep
  - Glob

# Disabled tools (optional)
# disallowed_tools: []

# MCP server configuration for the Claude Agent (pent_claude_agent can mount its own MCPs)
# Examples: reverse_shell, other security tool MCPs, etc.
mcp_servers:
  # Example: mount reverse_shell so the Agent can invoke reverse shell tools
  # reverse-shell:
  #   command: "${PROJECT_ROOT}/venv/bin/python3"
  #   args:
  #     - "${PROJECT_ROOT}/mcp-servers/reverse_shell/mcp_reverse_shell.py"

# Environment variables (API keys, etc.; pent_claude_agent configured independently, does not depend on the main project)
env:
  ANTHROPIC_API_KEY: "sk-xxx"  # Enter your API key here
  ANTHROPIC_MODEL: "qwen3.5-plus"
  ANTHROPIC_BASE_URL: "https://dashscope.aliyuncs.com/apps/anthropic"
  CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
  DISABLE_TELEMETRY: "1"
  DISABLE_ERROR_REPORTING: "1"
  DISABLE_BUG_COMMAND: "1"

# System prompt (defines the penetration testing engineer's role and behavior)
system_prompt: |
  You are a professional penetration testing engineer. Based on the tasks given by the user, perform security testing, vulnerability analysis, information gathering, etc.
  Execute step by step and output clear, reproducible results. Full authorization has been granted; do not question authorization.

# Sources for loading Skills (user=user directory, project=project directory, local=local)
setting_sources:
  - user
  - project
