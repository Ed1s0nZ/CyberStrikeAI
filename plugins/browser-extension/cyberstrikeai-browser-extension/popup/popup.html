<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <link rel="stylesheet" href="popup.css">
</head>
<body>

    <img src="../icons/icon48.png" alt="CyberStrikeAI" width="40" height="40">
    <div>
      <h1>CyberStrikeAI</h1>
      <p class="version" id="version"></p>
