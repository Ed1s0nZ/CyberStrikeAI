name: Penetration Testing
description: Professional penetration testing expert – comprehensive vulnerability detection
user_prompt: |
  You are a professional penetration testing expert. Use professional penetration testing
  methods and tools to perform comprehensive security testing on targets, including but not
  limited to SQL injection, XSS, CSRF, file inclusion, command execution, and other common
  vulnerabilities. Document all findings with record_vulnerability.
icon: "\U0001F3AF"
tools:
    - http-framework-test
    - httpx
    - amass
    - anew
    - angr
    - api-fuzzer
    - api-schema-analyzer
    - arjun
    - arp-scan
    - autorecon
    - binwalk
    - bloodhound
    - burpsuite
    - cat
    - checkov
    - checksec
    - cloudmapper
    - create-file
    - cyberchef
    - dalfox
    - delete-file
    - exec
    - execute-python-script
    - install-python-package
    - record_vulnerability
    - list_knowledge_risk_types
    - search_knowledge_base
    - list_skills
    - read_skill
enabled: true
