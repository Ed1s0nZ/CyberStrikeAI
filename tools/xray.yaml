name: "xray"
command: "/opt/xray/xray/xray_linux_amd64"
enabled: true
short_description: "长亭 Xray Web 漏洞扫描器 (主动扫描/JSON输出)"
description: "长亭科技 Xray 高级漏洞扫描器，执行主动扫描模式 (webscan)。\n\n**功能特点：**\n- 支持自定义配置文件。\n- 支持输出 JSON 格式报告。\n- 适用于单 URL 快速检测。\n\n**典型命令结构：**\n/opt/xray/xray/xray_linux_amd64 webscan --config <配置文件> --url <目标URL> --json-output <结果文件>\n\n**注意：** \n1. 目标 URL 必须包含协议头 (http:// 或 https://)。\n2. 若要获取 JSON 结果，请务必指定 --json-output 参数。\n3. 本配置已固定子命令为 'webscan'。"
parameters:
  - name: "config"
    type: "string"
    description: "配置config文件"
    required: false
    flag: "--config"
    format: "flag"
    default: "/config.yaml"
  - name: "ws"
    type: "string"
    description: "主动扫描"
    required: false
    flag: "ws"
    format: "flag"
    default: "1"
  - name: "target"
    type: "string"
    description: "目标 URL (例如: http://172.16.0.63:8080)"
    required: true
    flag: "--url"
    format: "flag"
  - name: "json_output"
    type: "string"
    description: "JSON 格式结果输出文件路径 (例如: result.json)"
    required: false
    flag: "--json-output"
    format: "flag"
  - name: "plugins"
    type: "string"
    description: "指定启用的插件，多个用逗号分隔 (例如: sqldet,xss)"
    required: false
    flag: "--plugins"
    format: "flag"
    default: ""
